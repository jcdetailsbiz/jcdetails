name: Sync Service Areas from Google Business Profile

on:
  schedule:
    - cron: '0 8 * * *'   # Daily at 8am UTC
  workflow_dispatch:        # Also allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit the updated file back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        env:
          GBP_CLIENT_ID:      ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET:  ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN:  ${{ secrets.GBP_REFRESH_TOKEN }}
          GBP_LOCATION_NAME:  ${{ secrets.GBP_LOCATION_NAME }}
          MAPS_API_KEY:       ${{ secrets.MAPS_API_KEY }}
        run: node scripts/sync-service-areas.js

      - name: Commit updated service-areas.js (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/service-areas.js
          git diff --staged --quiet || git commit -m "chore: auto-sync service areas from GBP [skip ci]" && git push
